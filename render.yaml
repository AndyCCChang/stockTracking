services:
  - type: web
    name: stock-tracking-api
    runtime: node
    rootDir: .
    buildCommand: npm install && npm --prefix server run build
    startCommand: npm --prefix server run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: PRICE_PROVIDER
        value: auto
      - key: FINNHUB_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
