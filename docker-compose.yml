services:
  db:
    image: postgres:16-alpine
    container_name: stock-tracking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stock_tracking
    ports:
      - "5432:5432"
    volumes:
      - stock_tracking_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_tracking"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stock_tracking_pgdata:
